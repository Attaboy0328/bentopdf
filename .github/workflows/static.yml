# Build on push to main and deploy static assets to Cloudflare Pages.
# Cloudflare Pages rejects any single file > 25 MiB. This repo ships LibreOffice WASM larger than that,
# so we use npm run build:cloudflare (strip-libreoffice-dist) to remove wasm from dist before upload.
# Host those files on R2/S3 and set VITE_LIBREOFFICE_BASE_URL so Office tools still work.
#
# Pages project name must match Cloudflare exactly: Workers & Pages → select project → name in sidebar.
# Override via repository variable CLOUDFLARE_PAGES_PROJECT_NAME if different from default "mypdf".
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions → Secrets):
#   CLOUDFLARE_API_TOKEN   — Create at Cloudflare Dashboard → My Profile → API Tokens →
#                            template "Edit Cloudflare Workers" or custom with Account +
#                            Cloudflare Pages → Edit (see Cloudflare docs for CI tokens).
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare dashboard right sidebar (Account ID).
#
# Optional repository variables:
#   CLOUDFLARE_PAGES_PROJECT_NAME — Optional. Defaults to mypdf if unset.
#   SITE_URL                      — Public origin for SEO, e.g. https://mypdf.282913.xyz
#   BASE_URL                      — Vite base path; "/" for apex Pages deploy.
#   VITE_LIBREOFFICE_BASE_URL — HTTPS prefix where libreoffice-wasm lives (e.g. R2 public bucket URL).
#                               Set at build time for Office-related tools. If unset, deploy works but LO tools may 404 until set.
#
# If your Pages project is also connected to Git in the Cloudflare dashboard, pick ONE source:
# either this workflow OR Cloudflare Git integration — otherwise you get duplicate builds.

name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  SIMPLE_MODE: ${{ vars.SIMPLE_MODE }}
  BASE_URL: ${{ vars.BASE_URL }}/
  SITE_URL: ${{ vars.SITE_URL }}
  VITE_LIBREOFFICE_BASE_URL: ${{ vars.VITE_LIBREOFFICE_BASE_URL }}
  HUSKY: "0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distribution
        run: npm run build:cloudflare

      - name: Resolve Cloudflare Pages project name
        id: cfproject
        run: |
          NAME="${CLOUDFLARE_PAGES_PROJECT_NAME}"
          if [ -z "$NAME" ]; then NAME="mypdf"; fi
          echo "Using Cloudflare Pages project: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ steps.cfproject.outputs.name }}
