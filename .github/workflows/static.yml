# Build on push to main and deploy static assets to Cloudflare Pages (bentopdf-cf).
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions → Secrets):
#   CLOUDFLARE_API_TOKEN   — Create at Cloudflare Dashboard → My Profile → API Tokens →
#                            template "Edit Cloudflare Workers" or custom with Account +
#                            Cloudflare Pages → Edit (see Cloudflare docs for CI tokens).
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare dashboard right sidebar (Account ID).
#
# Recommended repository variables (Settings → Variables → Actions):
#   SITE_URL               — Public origin for SEO scripts, e.g. https://mypdf.282913.xyz
#   BASE_URL               — Vite base path; use "/" for apex Pages deploy (or "/repo/" if needed).
#
# If your Pages project is also connected to Git in the Cloudflare dashboard, pick ONE source:
# either this workflow OR Cloudflare Git integration — otherwise you get duplicate builds.

name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  SIMPLE_MODE: ${{ vars.SIMPLE_MODE }}
  BASE_URL: ${{ vars.BASE_URL }}/
  SITE_URL: ${{ vars.SITE_URL }}
  HUSKY: "0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distribution
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=bentopdf-cf
