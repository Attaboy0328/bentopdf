<nav class="mypdf-nav sticky top-0 z-30" data-simple-nav="true">
  <div class="container mx-auto px-4">
    <div
      class="mypdf-nav-inner grid grid-cols-[1fr_auto_1fr] items-center gap-2 md:gap-4 min-h-14 md:min-h-[4.25rem] py-1.5"
    >
      <div
        class="flex-shrink-0 flex items-center cursor-pointer min-w-0 justify-self-start"
      >
        {{> mypdf-brand-logo }}
      </div>

      <div
        id="mypdf-header-category-nav"
        class="mypdf-header-category-nav min-w-0 justify-self-center px-1 overflow-visible"
        aria-label="Tool categories"
      ></div>

      <div class="flex items-center gap-2 flex-shrink-0 justify-self-end">
        <button
          type="button"
          id="mypdf-theme-toggle"
          class="inline-flex h-9 w-9 items-center justify-center rounded-lg transition-colors"
          aria-label="Toggle color theme"
        >
          <i
            data-mypdf-theme-icon="sun"
            data-lucide="sun"
            class="h-5 w-5"
            aria-hidden="true"
          ></i>
          <i
            data-mypdf-theme-icon="moon"
            data-lucide="moon"
            class="h-5 w-5 hidden"
            aria-hidden="true"
          ></i>
        </button>
        <div class="mypdf-nav-lang flex items-center gap-2">
          <div id="simple-mode-lang-switcher" class="flex items-center"></div>
          {{#if buildSha}}
          <span
            id="mypdf-nav-build"
            class="mypdf-nav-build font-mono"
            title="Build {{buildSha}}"
            >{{buildSha}}</span
          >
          {{/if}}
        </div>
      </div>
    </div>
  </div>
</nav>
